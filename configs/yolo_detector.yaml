# =============================================================================
# VISTRIKE YOLO Detector Configuration (Y1.1 beta schema)
# =============================================================================
# Single source of truth for the three-class YOLO detector used in beta:
# fighter_red, fighter_blue, referee. This YAML is the training/inference
# contract; the actual Ultralytics dataset file (generated by
# scripts/yolo/yolo_build_dataset.py) lives at data/yolo_detector/data.yaml.
#
# File roles (aligned with the rest of the repo):
#   - configs/yolo_detector.yaml  (this file)  detector contract
#   - configs/data_split.yaml                  train/val/test clip lists
#   - data/yolo_detector/                      generated Ultralytics tree
#     ├── data.yaml                            produced by the builder
#     ├── train/{images,labels}/
#     ├── val/{images,labels}/
#     └── test/{images,labels}/
#   - models/yolo/                             same models/ tree as unified/actions (Ultralytics output)
#     ├── weights/best.pt                      overwritten each train (inference default)
#     ├── weights/last.pt
#     ├── weights/best.onnx                    optional; from `yolo export`
#     └── args.yaml, results.csv, …            Ultralytics run metadata (same folder)
#
#   Training (repo root): project=models name=yolo — checkpoints stay under models/yolo/weights/.
#   Do NOT place under models/yolo/: classes.txt, dataset/, weights/local_<date>/.
#
# Inference mapping (Y1.1):
#   class_id 0 → role=fighter,  corner=red
#   class_id 1 → role=fighter,  corner=blue
#   class_id 2 → role=referee;  corner is NOT in {red, blue}
#
# Non-goals (beta):
#   - YOLO does NOT replace R(2+1)D action models.
#   - YOLO does NOT emit stance / lead_hand / visibility; those stay
#     "unknown" / UI-hidden for beta.
# =============================================================================

# Ordered class list — index = class_id. Do NOT reorder after training begins.
classes:
  - fighter_red     # class_id 0
  - fighter_blue    # class_id 1
  - referee         # class_id 2

# Training / export input size. Train and deploy must change together.
imgsz: 640

# Default inference thresholds (Ultralytics semantics).
conf: 0.25
iou: 0.45

# Path to the Ultralytics dataset YAML (generated by yolo_build_dataset.py
# from data/default.json + data/clip_manifest.csv + data/frames/<clip>/ and
# configs/data_split.yaml). Pass this to `yolo train data=...` and
# `yolo val data=...`.
train_data_yaml: data/yolo_detector/data.yaml

# Fine-tune starting point: largest YOLO26 **detect** weight (best accuracy; more VRAM/time than n/s/m).
# Match model= in your yolo detect train command.
base_checkpoint: yolo26x.pt
# First fallback: same generation, less VRAM (then yolo26m → yolo26s → yolo26n if needed).
base_checkpoint_fallback: yolo26l.pt
# Very old Ultralytics (no YOLO26): try yolo11x.pt / yolo11l.pt or yolov8x.pt / yolov8l.pt.
# Train (Ultralytics CLI) — repo root; fixed dir (overwrites each run):
#   yolo detect train data=data/yolo_detector/data.yaml model=yolo26x.pt imgsz=640 epochs=100 project=models name=yolo
# Checkpoints: models/yolo/weights/best.pt and last.pt (Ultralytics default; no copy step).

# Preprocessing / export notes (optional).
letterbox: true
export_notes: |
  YOLO .onnx is NOT produced by scripts/12_export_onnx.py (that script is unified + actions only).
  Use Ultralytics from repo root (match imgsz to training, here 640):
    yolo export model=models/yolo/weights/best.pt format=onnx imgsz=640
  Typical output beside the checkpoint: models/yolo/weights/best.onnx
  Optional flags: opset=17 simplify=True dynamic=False (tune for your ONNX runtime).
